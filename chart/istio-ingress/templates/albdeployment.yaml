{{- if or (eq .Values.ingress.lbtype "alb") (eq .Values.ingress.lbtype "sdnlb") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.ingress.name }}
  namespace: {{ .Values.ingress.namespace }}
spec:
  {{- if .Values.ingress.replicacount }}
  replicas: {{ .Values.ingress.replicacount }}
  {{- end }}
  {{- if .Values.ingress.istioselectors }}
  selector:
    matchLabels:
      {{- if .Values.ingress.istioselectors }}
      {{- toYaml .Values.ingress.istioselectors | nindent 6 }}
      {{- end }}
  {{- end }}
  template:
    metadata:
      annotations:
        inject.istio.io/templates: gateway
      labels:
        {{- if .Values.ingress.istioselectors }}
        {{- toYaml .Values.ingress.istioselectors | nindent 8 }}
        {{- end }}
        sidecar.istio.io/inject: "true"
        istio.io/gateway: "{{ .Values.ingress.name }}.{{ .Values.ingress.namespace }}"
    spec:
      {{- if .Values.ingress.nlbzones }}
      nodeSelector:
        {{- range $zone := .Values.ingress.nlbzones }}
        ibm-cloud.kubernetes.io/zone: {{ $zone | quote }}
        {{- end }}
      {{- end }}
      {{- if .Values.ingress.affinity }}
      affinity:
        {{- if .Values.ingress.affinity.podAffinity }}
        podAffinity:
          {{- toYaml .Values.ingress.affinity.podAffinity | nindent 10 }}
        {{- end }}
        {{- if .Values.ingress.affinity.nodeAffinity }}
        nodeAffinity:
          {{- toYaml .Values.ingress.affinity.nodeAffinity | nindent 10 }}
        {{- end }}
        {{- if .Values.ingress.affinity.podAntiAffinity }}
        podAntiAffinity:
          {{- toYaml .Values.ingress.affinity.podAntiAffinity | nindent 10 }}
        {{- end }}
      {{- end }}
      {{- if .Values.ingress.topologySpreadConstraints }}
      topologySpreadConstraints:
      {{- toYaml .Values.ingress.topologySpreadConstraints | nindent 6 }}
      {{- end }}
      serviceAccountName: {{ .Values.ingress.name }}
      {{- if .Values.ingress.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.ingress.terminationGracePeriodSeconds }}
      {{- end }}
      tolerations:
      {{- if .Values.ingress.tolerations }}
      {{- toYaml .Values.ingress.tolerations | nindent 6 }}
      {{- end }}
      containers:
      - name: istio-proxy
        image: auto # The image will automatically update each time the pod starts.
        securityContext:
          capabilities:
            drop:
            - ALL
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        resources:
        {{- if .Values.ingress.resources }}
        {{- toYaml .Values.ingress.resources | nindent 10 }}
        {{- end }}
        ports:
        - containerPort: 15090
          protocol: TCP
          name: http-envoy-prom
        {{- if .Values.ingress.ports }}
        {{- range .Values.ingress.ports }}
        - containerPort: {{ .port }}
          protocol: {{ .proto | toString }}
          name: {{ .name }}
        {{- end }}
        {{- end }}
{{- end }}
