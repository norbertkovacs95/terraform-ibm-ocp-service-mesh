apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  labels:
    operators.coreos.com/servicemeshoperator3.openshift-operators: ""
  name: {{ .Values.operator.name }}
  namespace: {{ .Values.operator.namespace }}
spec:
  channel: stable
  installPlanApproval: {{ .Values.operator.installplanapproval }}
  name: {{ .Values.operator.name }}
  source: {{ .Values.operator.source }}
  sourceNamespace: {{ .Values.operator.sourcenamespace }}
  {{- if .Values.operator.version }}
  startingCSV: {{ .Values.operator.version }}
  {{- end }}
